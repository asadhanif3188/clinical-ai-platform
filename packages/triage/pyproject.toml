[project]
name = "clinical-ai-triage"
version = "0.1.0"
description = "ClinicalTriage AI — Document Pipeline"
requires-python = ">=3.12"
dependencies = [
    "clinical-ai-shared",
    "clinical-ai-memory",
    "PyMuPDF>=1.24.5",
    "pdfplumber>=0.11.1",
    "pytesseract>=0.3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
