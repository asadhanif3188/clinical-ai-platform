[project]
name = "clinical-ai-shared"
version = "0.1.0"
description = "Shared infrastructure for Clinical AI Platform"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7.4",
    "pydantic-settings>=2.3.3",
    "sqlalchemy[asyncio]>=2.0.31",
    "asyncpg>=0.29.0",
    "redis>=5.0.6",
    "neo4j>=5.21.0",
    "anthropic>=0.31.1",
    "structlog>=24.2.0",
    "httpx>=0.27.0",
    "sentence-transformers>=3.3.0",
    "pgvector>=0.3.1",
    "langfuse>=2.33.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
